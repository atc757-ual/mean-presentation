<div class="container">
  <header>
    <h1>Gestor de Tareas</h1>
    <p>MEAN Stack Presentation</p>
  </header>

  <main>
    <section class="card add-task">
      <h2>Nueva Tarea</h2>
      <div class="form-group">
        <input type="text" [(ngModel)]="newTaskTitle" placeholder="¿Qué hay que hacer?">
        <textarea [(ngModel)]="newTaskDesc" placeholder="Descripción (opcional)"></textarea>
        <button (click)="addTask()" [disabled]="!newTaskTitle">Añadir Tarea</button>
      </div>
    </section>

    <section class="task-list">
      <div *ngIf="tasks.length === 0" class="empty-state">
         No hay tareas pendientes. ¡Buen trabajo!
      </div>

      <div *ngFor="let task of tasks" class="task-card" [class.completed]="task.completed">
        <div class="task-info">
          <input type="checkbox" [checked]="task.completed" (change)="toggleTask(task)">
          <div class="task-text">
            <h3>{{ task.title }}</h3>
            <p>{{ task.description }}</p>
          </div>
        </div>
        <button class="delete-btn" (click)="confirmDelete(task)">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19V4M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
        </button>
      </div>
    </section>
  </main>

  <!-- Modal de Confirmación -->
  <div class="modal-overlay" *ngIf="showModal">
    <div class="modal card">
      <h2>Confirmar eliminación</h2>
      <p>¿Estás seguro de que quieres eliminar la tarea "<strong>{{ taskToDelete?.title }}</strong>"?</p>
      <div class="modal-actions">
        <button class="secondary" (click)="showModal = false">Cancelar</button>
        <button class="danger" (click)="deleteTask()">Eliminar</button>
      </div>
    </div>
  <!-- Toast Notification -->
  <div class="toast" *ngIf="toast.show" [class.error]="toast.isError">
    {{ toast.message }}
  </div>
</div>
